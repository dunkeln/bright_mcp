name: Site CI

on:
  pull_request:
    paths:
      - site/**
      - .bun-version
      - .github/workflows/site-ci.yml
  push:
    branches: [main]
    paths:
      - site/**
      - .bun-version
      - .github/workflows/site-ci.yml

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - run: bun install --frozen-lockfile
      - run: bun run build
